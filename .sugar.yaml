backend: compose
env-file: .env

defaults:
  profile: "${{ env.ENV }}"

profiles:
  prod:
    project-name: episcanner-prod
    config-path:
      - containers/compose.yaml
      - containers/compose-prod.yaml
    env-file: .env
    services:
      default:
        - wave
      available:
        - name: wave

  dev:
    project-name: episcanner-dev
    config-path:
      - containers/compose.yaml
      - containers/compose-dev.yaml
    env-file: .env
    services:
      default:
        - wave
      available:
        - name: wave

  ci:
    project-name: episcanner-dev
    config-path:
      - containers/compose.yaml
    env-file: .env
    services:
      default:
        - wave
      available:
        - name: wave
