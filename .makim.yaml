groups:
  episcanner:
    tasks:
      deploy:
        help: Start the stack (compose up) for a profile/service.
        args:
          profile:
            type: string
            help: Sugar profile (dev/prod/ci).
          service:
            type: string
            help: Service name (e.g. wave).
        run: |
          sugar --profile "${{ args.profile }}" compose-ext start \
            --services "${{ args.service }}" \
            --options "-d --build"

      down:
        help: Stop and remove the stack for a profile/service.
        args:
          profile:
            type: string
            help: Sugar profile (dev/prod/ci).
          service:
            type: string
            help: Service name (e.g. wave).
        run: |
          sugar --profile "${{ args.profile }}" down \
            --services "${{ args.service }}" \
            --options "-v"

      container-wait:
        help: Wait for a specific service to become available.
        args:
          timeout:
            type: integer
            default: 120
            help: Timeout (seconds) for the health check.
          service:
            type: string
            help: Service name to wait for.
        run: |
          timeout "${{ args.timeout }}" \
            ./containers/scripts/healthcheck.sh "${{ args.service }}"
